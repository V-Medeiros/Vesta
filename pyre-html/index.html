<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pyre</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <main>
        <header class="app-header">
            <h1>PYRE</h1>
            <nav class="header-actions">
                <a class="active" href="index.html">Temporizador</a>
                <a href="cronometro.html">Cronometro</a>
            </nav>
        </header>

        <section class="sectionFoco">
            <img class="flame-image" id="flame" src="assets/flame.svg" alt="Chama do Pyre" />

            <strong id="timerDisplay">15:00</strong>

            <div class="duracao">
                <button class="botaoDuracao">15</button>
                <button class="botaoDuracao">30</button>
                <button class="botaoDuracao">45</button>
                <button class="botaoDuracao">60</button>
                <button class="botaoDuracao">120</button>
            </div>

            <div class="timerControl">
                <button id="start">start</button>
                <button id="pause">pause</button>
                <button id="stop">stop</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
